name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run Lambda tests with coverage
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_AUTHORITY: ${{ vars.VITE_COGNITO_AUTHORITY }}
          VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ vars.VITE_COGNITO_HOSTED_UI_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_REDIRECT_URI: ${{ vars.VITE_COGNITO_LOGOUT_REDIRECT_URI }}
          VITE_COGNITO_SCOPE: ${{ vars.VITE_COGNITO_SCOPE }}

  cdk-deploy:
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infrastructure/requirements.txt

      - name: Setup Node.js for CDK CLI
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install infrastructure dependencies
        run: pip install -r requirements.txt

      - name: CDK deploy
        run: cdk deploy --require-approval never --quiet
        env:
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          COGNITO_CALLBACK_URLS: ${{ vars.COGNITO_CALLBACK_URLS }}
          COGNITO_LOGOUT_URLS: ${{ vars.COGNITO_LOGOUT_URLS }}
          CORS_ALLOW_ORIGINS: ${{ vars.CORS_ALLOW_ORIGINS }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  amplify-deploy:
    runs-on: ubuntu-latest
    needs: cdk-deploy
    if: ${{ vars.AMPLIFY_APP_ID != '' && vars.AMPLIFY_BRANCH_NAME != '' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check existing Amplify jobs
        id: amplify-jobs
        run: |
          COUNT=$(aws amplify list-jobs \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch-name "${{ vars.AMPLIFY_BRANCH_NAME }}" \
            --max-items 25 \
            --query "length(jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'])" \
            --output text | tr -d '\r\n')
          printf 'active_jobs=%s\n' "$COUNT" >> "$GITHUB_OUTPUT"
        env:
          AWS_PAGER: ""

      - name: Trigger Amplify deployment
        if: ${{ steps.amplify-jobs.outputs.active_jobs == '0' }}
        run: >
          aws amplify start-job
          --app-id "${{ vars.AMPLIFY_APP_ID }}"
          --branch-name "${{ vars.AMPLIFY_BRANCH_NAME }}"
          --job-type RELEASE

      - name: Skip Amplify deployment because a job is already active
        if: ${{ steps.amplify-jobs.outputs.active_jobs != '0' }}
        run: |
          echo "Amplify branch already has an active job. Skipping start-job."
